<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#f0f4f7",
              "error": "#a83836",
              "surface-variant": "#dce4e8",
              "on-primary": "#e6ffee",
              "on-tertiary-fixed-variant": "#3b0003",
              "on-error": "#fff7f6",
              "surface-container-highest": "#dce4e8",
              "surface-container": "#eaeff2",
              "primary-fixed-dim": "#58e7ab",
              "primary-container": "#69f6b8",
              "inverse-surface": "#0b0f10",
              "on-error-container": "#6e0a12",
              "surface-container-lowest": "#ffffff",
              "secondary-dim": "#764900",
              "inverse-primary": "#69f6b8",
              "inverse-on-surface": "#9a9d9f",
              "error-dim": "#67040d",
              "surface-dim": "#d4dbdf",
              "secondary": "#865400",
              "on-secondary-container": "#744800",
              "on-secondary-fixed": "#5b3700",
              "surface-container-high": "#e3e9ed",
              "surface": "#f7f9fb",
              "surface-tint": "#006d4a",
              "background": "#f7f9fb",
              "on-tertiary-container": "#1f0001",
              "primary-fixed": "#69f6b8",
              "tertiary-container": "#fd4e4d",
              "primary-dim": "#005f40",
              "on-tertiary": "#fff7f6",
              "tertiary-fixed": "#fd4e4d",
              "on-primary-container": "#005a3c",
              "tertiary-dim": "#a9081a",
              "on-tertiary-fixed": "#000000",
              "outline-variant": "#acb3b7",
              "surface-bright": "#f7f9fb",
              "secondary-fixed-dim": "#ffcb8e",
              "on-secondary": "#fff7f3",
              "outline": "#747c80",
              "on-surface": "#2c3437",
              "secondary-container": "#ffddb8",
              "primary": "#006d4a",
              "on-secondary-fixed-variant": "#815100",
              "on-primary-fixed-variant": "#006544",
              "tertiary-fixed-dim": "#ec4142",
              "on-surface-variant": "#596064",
              "error-container": "#fa746f",
              "on-primary-fixed": "#00452d",
              "secondary-fixed": "#ffddb8",
              "tertiary": "#ba1b24",
              "on-background": "#2c3437"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #f7f9fb;
        color: #2c3437;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 bg-surface/80 backdrop-blur-xl">
<div class="flex justify-between items-center h-16 px-6 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-2 text-xl font-bold text-primary tracking-tighter">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-inter tracking-tight font-semibold text-[1.75rem]">Quran Revision</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-surface-container-highest transition-colors duration-400 active:scale-95 ease-in-out">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="settings">settings</span>
</button>
</div>
</div>
</header>
<main class="min-h-[calc(100vh-64px-72px)] flex items-center justify-center px-6 py-12">
<div class="max-w-xl w-full text-center">
<!-- Illustration Area -->
<div class="relative mb-12 flex justify-center">
<!-- Decorative Background Element -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl scale-150 -z-10"></div>
<div class="w-48 h-48 bg-surface-container-lowest rounded-full flex items-center justify-center shadow-[0_20px_40px_rgba(44,52,55,0.06)] relative overflow-hidden">
<!-- Glassmorphic pattern in background -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent"></div>
<div class="relative flex flex-col items-center">
<span class="material-symbols-outlined text-primary text-[5rem] drop-shadow-sm" data-icon="menu_book" style="font-variation-settings: 'wght' 200;">menu_book</span>
<div class="absolute -right-2 -top-2 w-12 h-12 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined text-xl" data-icon="add">add</span>
</div>
</div>
</div>
</div>
<!-- Empty State Content -->
<h1 class="font-headline font-bold text-[1.75rem] md:text-4xl text-on-surface tracking-tight mb-4">
                Start tracking your Quran revision
            </h1>
<p class="font-body text-on-surface-variant text-lg md:text-xl mb-10 max-w-md mx-auto leading-relaxed opacity-80">
                Add Surahs you want to track and mark them when you revise.
            </p>
<div class="flex flex-col sm:flex-row items-center justify-center gap-4">
<button class="w-full sm:w-auto px-8 py-4 bg-gradient-to-br from-primary to-primary-dim text-white font-semibold rounded-full shadow-[0_8px_16px_rgba(0,109,74,0.2)] hover:shadow-[0_12px_24px_rgba(0,109,74,0.3)] transition-all duration-400 active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
<span class="text-sm font-bold uppercase tracking-widest">Add your first Surah</span>
</button>
<button class="w-full sm:w-auto px-8 py-4 bg-surface-container-high text-on-surface-variant font-semibold rounded-full hover:bg-surface-container-highest transition-all duration-400 active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="info">info</span>
<span class="text-sm font-bold uppercase tracking-widest">How it works</span>
</button>
</div>
<!-- Asymmetric Decorative Element -->
<div class="mt-20 flex justify-center gap-8 opacity-20 pointer-events-none">
<div class="w-24 h-1 bg-primary rounded-full"></div>
<div class="w-12 h-1 bg-primary rounded-full"></div>
<div class="w-6 h-1 bg-primary rounded-full"></div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-surface-container-lowest/80 backdrop-blur-xl shadow-[0_-20px_40px_rgba(44,52,55,0.06)]">
<div class="w-full flex justify-around items-center px-4 py-3 pb-safe">
<!-- Dashboard (Active) -->
<div class="flex flex-col items-center justify-center text-primary bg-primary-container/20 rounded-full px-4 py-1 transition-all duration-400 scale-110">
<span class="material-symbols-outlined" data-icon="dashboard" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-inter text-[0.75rem] font-bold uppercase tracking-widest mt-0.5">Dashboard</span>
</div>
<!-- Stats (Inactive) -->
<div class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-inter text-[0.75rem] font-bold uppercase tracking-widest mt-0.5">Stats</span>
</div>
<!-- Profile (Inactive) -->
<div class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-inter text-[0.75rem] font-bold uppercase tracking-widest mt-0.5">Profile</span>
</div>
</div>
</nav>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-1/2 h-1/2 bg-gradient-to-bl from-primary/5 to-transparent blur-3xl pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/2 h-1/2 bg-gradient-to-tr from-surface-container-highest/20 to-transparent blur-3xl pointer-events-none"></div>
</body></html>
