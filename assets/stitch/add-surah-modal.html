</div>
<div class="flex gap-4">
<div class="p-2 rounded-full hover:bg-surface-container-highest transition-colors duration-400">

</div>

<main class="max-w-7xl mx-auto px-6 py-8">

</div>
</div>

</div>
</div>

</div>
<div class="bg-surface-container-lowest p-6 rounded-DEFAULT flex items-center justify-between border-l-4 border-tertiary">
